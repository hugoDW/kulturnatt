# kör båda services + nginx-gateway lokalt
# starta med: docker compose up
services:
  # profile-service: hanterar all användardata och databasen
  profile-service:
    build:
      context: .
      dockerfile: ./apps/profile-service/Dockerfile
    environment:
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      MATCHING_SERVICE_URL: http://matching-service:8002
      KULTURBILJETT_API_KEY: ${KULTURBILJETT_API_KEY}
      MUSICBRAINZ_API_KEY: ${MUSICBRAINZ_API_KEY}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY}
    expose:
      - "8001"

  # matching-service: kör match- och swipe-algoritmerna
  matching-service:
    build: ./apps/matching-service
    environment:
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      PROFILE_SERVICE_URL: http://profile-service:8001
    expose:
      - "8002"

  # gateway: enda containern som syns utåt, routar trafik till rätt service
  gateway:
    build: ./apps/gateway
    environment:
      PROFILE_UPSTREAM: profile-service:8001
      MATCHING_UPSTREAM: matching-service:8002
    ports:
      - "80:80"
    depends_on:
      - profile-service
      - matching-service
