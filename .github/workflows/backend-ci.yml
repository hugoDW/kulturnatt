name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r apps/matching-service/requirements.txt
          pip install pytest ruff

      - name: Lint
        run: |
          ruff check apps/profile-service/
          ruff check apps/matching-service/

      - name: Run tests
        run: pytest apps/matching-service/tests/
