# nginx gateway — enda containern som syns utåt
# routar /profile/* till profile-service och /swipe till matching-service
events {}

http {
    server {
        listen 80;

        # alla profil-routes går till profile-service
        location /profile/ {
            proxy_pass http://profile-service:8001;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # swipe-routen går till matching-service
        location = /swipe {
            proxy_pass http://matching-service:8002;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
