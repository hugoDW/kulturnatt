# nginx gateway - enda containern som syns utat
# routar extern trafik till ratt service
events {}

http {
    server {
        listen 80;

        # alla profil-routes gar till profile-service
        location /profile/ {
            proxy_pass http://profile-service:8001;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # externa kultur-/media-API:er proxyas via backend sa API-nycklar inte hamnar i appen
        location /external/ {
            proxy_pass http://profile-service:8001;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # swipe-routen gar till matching-service
        location = /swipe {
            proxy_pass http://matching-service:8002;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
